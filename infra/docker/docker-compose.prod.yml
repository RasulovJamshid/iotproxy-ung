version: '3.9'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: iotproxy
      POSTGRES_USER: iotproxy
      POSTGRES_PASSWORD: iotproxy
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ../timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis-bull:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_bull_data:/data
      - ../redis/redis-bull.conf:/usr/local/etc/redis/redis.conf:ro

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ../redis/redis-cache.conf:/usr/local/etc/redis/redis.conf:ro

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9090'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://iotproxy:iotproxy@timescaledb:5432/iotproxy
      REDIS_BULL_URL: redis://redis-bull:6379/0
      REDIS_CACHE_URL: redis://redis-cache:6379/0
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: iotproxy-exports
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: noreply@iotproxy.io
      SMTP_PASS: unused
      JWT_SECRET: change-me-with-a-long-random-secret
      JWT_REFRESH_SECRET: change-me-with-a-different-long-random-secret
      APP_BASE_URL: https://example.com
      NODE_ENV: production
      POD_NAME: backend-1
    depends_on:
      - timescaledb
      - redis-bull
      - redis-cache

  frontend:
    build:
      context: ../../
      dockerfile: frontend/Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://backend:3000
      VITE_WS_TARGET: ws://backend:3000
    depends_on:
      - backend

volumes:
  timescaledb_data:
  redis_bull_data:
  mosquitto_data:
  mosquitto_logs:
  minio_data:
