version: '3.9'

services:

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: iotproxy
      POSTGRES_USER: iotproxy
      POSTGRES_PASSWORD: iotproxy
    ports:
      - '5432:5432'
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ../timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iotproxy']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-bull:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - '6379:6379'
    volumes:
      - redis_bull_data:/data
      - ../redis/redis-bull.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - '6380:6379'
    volumes:
      - ../redis/redis-cache.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9002:9001'
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9090'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9090:9090'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  backend:
    build:
      # Context is the monorepo root so Dockerfile can COPY shared/ and backend/
      context: ../../
      dockerfile: backend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://iotproxy:iotproxy@timescaledb:5432/iotproxy
      REDIS_BULL_URL: redis://redis-bull:6379/0
      REDIS_CACHE_URL: redis://redis-cache:6379/0
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: iotproxy-exports
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: noreply@iotproxy.io
      SMTP_PASS: unused
      JWT_SECRET: dev-secret-change-me-minimum-32-chars-xxxx
      JWT_REFRESH_SECRET: dev-refresh-secret-32-chars-minimum-xx
      APP_BASE_URL: http://localhost:3000
      NODE_ENV: development
      POD_NAME: backend-1
    volumes:
      # Hot-reload: mount source only, not node_modules
      - ../../backend/src:/app/backend/src:ro
      - ../../shared/src:/app/shared/src:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      redis-bull:
        condition: service_healthy
      redis-cache:
        condition: service_healthy

  frontend:
    build:
      context: ../../
      dockerfile: frontend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_TARGET: http://backend:3000
      VITE_WS_TARGET: ws://backend:3000
    volumes:
      - ../../frontend/src:/app/frontend/src:ro
      - ../../frontend/vite.config.ts:/app/frontend/vite.config.ts:ro
    depends_on:
      - backend

volumes:
  timescaledb_data:
  redis_bull_data:
  mosquitto_data:
  mosquitto_logs:
  minio_data:
