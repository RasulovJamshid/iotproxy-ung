# Mosquitto — development config (no TLS, allow anonymous)
listener 1883
allow_anonymous true

# WebSocket listener for browser clients
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# In production: replace allow_anonymous with mosquitto-go-auth plugin
# and point auth_plugin_conf_file at your API key validation endpoint
