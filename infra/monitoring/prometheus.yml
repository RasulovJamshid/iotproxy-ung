global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'iotproxy-backend'
    static_configs:
      - targets: ['backend:3000']
    metrics_path: '/api/v1/metrics'

  - job_name: 'timescaledb'
    static_configs:
      - targets: ['timescaledb-exporter:9187']

  - job_name: 'redis-bull'
    static_configs:
      - targets: ['redis-exporter-bull:9121']

  - job_name: 'redis-cache'
    static_configs:
      - targets: ['redis-exporter-cache:9121']
